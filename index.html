<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว - น้องกาแฟ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Mitr:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-cream: #FDFBF7;
            --warm-beige: #F4EAE1;
            --accent-caramel: #D4A373;
            --dark-brown: #4A3E3D;
            --text-color: #5C5552;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--warm-beige);
            background-image: radial-gradient(rgba(212, 163, 115, 0.15) 1px, transparent 0);
            background-size: 24px 24px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .profile-card {
            background-color: var(--primary-cream);
            width: 100%;
            max-width: 450px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(74, 62, 61, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
            position: relative;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 12px;
            background: linear-gradient(90deg, var(--accent-caramel), #E6CCB2);
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .profile-header {
            text-align: center;
            padding: 40px 20px 20px 20px;
            background: linear-gradient(to bottom, rgba(244, 234, 225, 0.3), transparent);
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            background-color: var(--warm-beige);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .avatar-container i {
            font-size: 3.5rem;
            color: var(--accent-caramel);
        }

        .profile-header h1 {
            font-family: 'Mitr', sans-serif;
            font-size: 1.8rem;
            color: var(--dark-brown);
            margin-bottom: 5px;
        }

        .nickname {
            display: inline-block;
            background-color: var(--warm-beige);
            color: var(--dark-brown);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .profile-body {
            padding: 10px 35px 40px 35px;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(212, 163, 115, 0.2);
        }

        .info-item:last-child {
            border-bottom: none;
        }
